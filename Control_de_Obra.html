<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Control de Obra · 18 meses</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
    :root {
        --bg:#0F1117;--surface:#181B24;--surface2:#1E2130;--surface3:#242840;
        --border:#2A2E3F;--border2:#343856;--text:#E8EAF2;--text2:#8B90A8;--text3:#565C7A;
        --blue:#4C8EF5;--blue-dim:#1E3A6E;--blue-glow:rgba(76,142,245,.15);
        --green:#3ECF8E;--green-dim:#0E3D28;--green-glow:rgba(62,207,142,.12);
        --amber:#F5A623;--amber-dim:#3D2A0A;--amber-glow:rgba(245,166,35,.12);
        --red:#F56565;--red-dim:#3D1212;--red-glow:rgba(245,101,101,.12);
        --purple:#A78BFA;--purple-dim:#2D1F5E;
        --radius:10px;--radius-sm:6px;
        --shadow:0 1px 3px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
        --shadow-lg:0 8px 32px rgba(0,0,0,.5);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;}
    .layout{display:flex;min-height:100vh;}
    .sidebar{width:228px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;}
    .sb-brand{padding:22px 18px 16px;border-bottom:1px solid var(--border);}
    .sb-icon{width:34px;height:34px;background:var(--blue-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
    .sb-icon svg{fill:var(--blue);}
    .sb-brand h1{font-size:14px;font-weight:600;}
    .sb-brand p{font-size:11px;color:var(--text3);margin-top:2px;}
    .nav{padding:10px 8px;flex:1;}
    .nav-s{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.8px;padding:12px 10px 5px;text-transform:uppercase;}
    .nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;}
    .nav-item:hover{background:var(--surface2);color:var(--text);}
    .nav-item.active{background:var(--blue-dim);color:var(--blue);font-weight:500;}
    .nav-item svg{width:15px;height:15px;flex-shrink:0;}
    .sb-footer{padding:14px;border-top:1px solid var(--border);}
    .prog-obra{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;}
    .prog-obra .plabel{font-size:11px;color:var(--text3);margin-bottom:5px;}
    .prog-obra .pbar{height:5px;background:var(--border2);border-radius:3px;overflow:hidden;margin-bottom:4px;}
    .prog-obra .pfill{height:100%;background:var(--blue);border-radius:3px;transition:width .5s;}
    .prog-obra .ppct{font-size:12px;font-weight:600;color:var(--blue);}
    .tcn-widget{margin-top:10px;background:var(--surface3);border-radius:var(--radius-sm);padding:9px 11px;}
    .tw-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
    .tcn-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
    .tcn-row input{flex:1;font-family:'DM Mono',monospace;font-size:12px;padding:5px 8px;background:var(--surface2);border:1px solid var(--border2);border-radius:4px;color:var(--text);}
    .tcn-row span{font-size:11px;color:var(--text3);}
    .save-indicator{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3);padding:6px 12px 0;}
    .save-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
    .save-dot.saving{background:var(--amber);animation:pulse .8s ease-in-out infinite;}
    .save-dot.error{background:var(--red);}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .main{margin-left:228px;flex:1;}
    .topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:50;}
    .topbar h2{font-size:15px;font-weight:500;}
    .topbar .actions{display:flex;gap:8px;}
    .content{padding:26px;}
    .alerts-banner{margin-bottom:16px;display:flex;flex-direction:column;gap:7px;}
    .alert-item{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:var(--radius-sm);font-size:13px;}
    .alert-item.danger{background:var(--red-glow);color:var(--red);border:1px solid rgba(245,101,101,.25);}
    .alert-item.warning{background:var(--amber-glow);color:var(--amber);border:1px solid rgba(245,166,35,.25);}
    .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
    .metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px 17px;box-shadow:var(--shadow);}
    .metric-card .ml{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;}
    .metric-card .mv{font-size:20px;font-weight:600;letter-spacing:-.5px;font-family:'DM Mono',monospace;}
    .metric-card .ms{font-size:11px;color:var(--text3);margin-top:3px;}
    .c-blue{color:var(--blue)}.c-green{color:var(--green)}.c-amber{color:var(--amber)}.c-red{color:var(--red)}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;}
    .card-hdr{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .card-hdr h3{font-size:13px;font-weight:600;}
    .card-body{padding:16px 18px;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{text-align:left;font-size:10px;font-weight:600;color:var(--text3);padding:8px 11px;letter-spacing:.4px;border-bottom:1px solid var(--border);text-transform:uppercase;}
    td{padding:9px 11px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:var(--surface2);}
    .num-cell{font-family:'DM Mono',monospace;font-size:12px;}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;}
    .badge::before{content:'';width:5px;height:5px;border-radius:50%;}
    .badge.pagado{background:var(--green-dim);color:var(--green);}
    .badge.pagado::before{background:var(--green);}
    .badge.pendiente{background:var(--amber-dim);color:var(--amber);}
    .badge.pendiente::before{background:var(--amber);}
    .badge.vencido{background:var(--red-dim);color:var(--red);}
    .badge.vencido::before{background:var(--red);}
    .drag-list{display:flex;flex-direction:column;gap:5px;}
    .drag-item{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:grab;transition:all .15s;user-select:none;}
    .drag-item:hover{border-color:var(--border2);}
    .drag-item.dragging{opacity:.35;border-style:dashed;cursor:grabbing;}
    .drag-item.drag-over{border-color:var(--blue);background:var(--blue-dim);}
    .drag-handle{display:flex;flex-direction:column;gap:2.5px;padding:2px 3px;flex-shrink:0;color:var(--text3);}
    .drag-handle span{display:block;width:13px;height:2px;background:currentColor;border-radius:1px;}
    .di-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
    .di-info{flex:1;min-width:0;}
    .di-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .di-sub{font-size:11px;color:var(--text3);margin-top:1px;}
    .di-actions{display:flex;gap:4px;flex-shrink:0;align-items:center;}
    .etapa-status{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500;}
    .etapa-status.pendiente{background:var(--surface3);color:var(--text3);}
    .etapa-status.en-curso{background:var(--blue-dim);color:var(--blue);}
    .etapa-status.completada{background:var(--green-dim);color:var(--green);}
    .etapa-status.atrasada{background:var(--red-dim);color:var(--red);}
    .etapa-prog-wrap{display:flex;align-items:center;gap:8px;margin-top:6px;}
    .etapa-prog-track{flex:1;height:7px;background:var(--surface3);border-radius:4px;overflow:hidden;}
    .etapa-prog-fill{height:100%;border-radius:4px;transition:width .4s;}
    .etapa-tl-mini{display:grid;grid-template-columns:repeat(18,1fr);gap:2px;margin-top:6px;}
    .etm-cell{height:6px;border-radius:2px;}
    .gantt-row{display:grid;grid-template-columns:148px 1fr;align-items:center;gap:6px;margin-bottom:3px;}
    .gantt-label{font-size:11px;color:var(--text2);text-align:right;padding-right:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .gantt-track{display:grid;grid-template-columns:repeat(18,1fr);gap:2px;}
    .gantt-cell{height:18px;border-radius:3px;}
    .months-strip{display:grid;grid-template-columns:repeat(18,1fr);gap:2px;margin-bottom:4px;}
    .mc{text-align:center;padding:4px 1px;border-radius:3px;font-size:9px;font-weight:500;}
    .mc.past{background:#1A3A5C;color:#6BAAD4;}
    .mc.current{background:var(--blue);color:#fff;}
    .mc.future{background:var(--surface3);color:var(--text3);}
    .amt-wrap{display:flex;border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;background:var(--surface2);}
    .amt-wrap:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow);}
    .amt-wrap input{flex:1;border:none;background:transparent;color:var(--text);padding:8px 10px;font-size:13px;outline:none;font-family:'DM Sans',sans-serif;}
    .amt-tag{padding:0 12px;display:flex;align-items:center;font-size:11px;font-weight:600;font-family:'DM Mono',monospace;color:var(--blue);background:var(--blue-dim);border-left:1px solid var(--border2);}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:12px;}
    .form-row.full{grid-template-columns:1fr;}
    .fg{display:flex;flex-direction:column;gap:4px;}
    .fg label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.4px;text-transform:uppercase;}
    input,select{font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s;}
    input::placeholder{color:var(--text3);}
    select option{background:var(--surface2);}
    input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow);}
    input[type="color"]{padding:2px 4px;height:36px;cursor:pointer;}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text);transition:all .15s;white-space:nowrap;}
    .btn:hover{background:var(--surface3);}
    .btn:active{transform:scale(.98);}
    .btn-primary{background:var(--blue-dim);color:var(--blue);border-color:rgba(76,142,245,.3);}
    .btn-primary:hover{background:#1A3A6E;border-color:var(--blue);}
    .btn-green{background:var(--green-dim);color:var(--green);border-color:rgba(62,207,142,.3);}
    .btn-danger{color:var(--red);border-color:transparent;background:transparent;}
    .btn-danger:hover{background:var(--red-dim);}
    .btn-excel{background:#0E3D20;color:#3ECF8E;border-color:rgba(62,207,142,.3);}
    .btn-sm{padding:5px 9px;font-size:12px;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:500px;max-width:95vw;transform:translateY(8px);transition:transform .2s;}
    .modal-overlay.open .modal{transform:translateY(0);}
    .modal-hdr{padding:16px 20px 13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .modal-hdr h3{font-size:14px;font-weight:600;}
    .modal-body{padding:18px 20px;}
    .modal-ftr{padding:13px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
    .empty{text-align:center;padding:3rem 1rem;color:var(--text3);}
    .color-dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle;}
    .filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .page{display:none;}
    .page.active{display:block;}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
    @media(max-width:960px){.metrics{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sb-brand">
            <div class="sb-icon"><svg viewBox="0 0 20 20" width="18" height="18"><path d="M3 5a2 2 0 012-2h10a2 2 0 012 2v2H3V5zm0 4h14v8a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/></svg></div>
            <h1>Control de Obra</h1>
            <p id="sbFechas">18 meses</p>
        </div>
        <nav class="nav">
            <div class="nav-s">Tablero</div>
            <button class="nav-item active" onclick="goTo('resumen')">
                <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 3a1 1 0 011-1h14a1 1 0 011 1v4H2V3zm0 6h14v8a1 1 0 01-1 1H3a1 1 0 01-1-1v-8z"/></svg>Resumen
            </button>
            <button class="nav-item" onclick="goTo('etapas')">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>Etapas
            </button>
            <div class="nav-s">Finanzas</div>
            <button class="nav-item" onclick="goTo('rubros')">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>Rubros
            </button>
            <button class="nav-item" onclick="goTo('pagos')">
                <svg viewBox="0 0 20 20" fill="currentColor"><path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z"/><path fill-rule="evenodd" d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" clip-rule="evenodd"/></svg>Pagos
            </button>
            <button class="nav-item" onclick="goTo('balance')">
                <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg>Balance
            </button>
            <div class="nav-s">Sistema</div>
            <button class="nav-item" onclick="goTo('config')">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>Configuración
            </button>
        </nav>
        <div class="sb-footer">
            <div class="prog-obra">
                <div class="plabel">Avance financiero</div>
                <div class="pbar"><div class="pfill" id="sbProg" style="width:0%"></div></div>
                <div class="ppct" id="sbProgPct">0%</div>
            </div>
            <div class="tcn-widget">
                <div class="tw-label">Tipo de cambio</div>
                <div class="tcn-row">
                    <span>$</span>
                    <input type="number" id="tcnInput" value="1200" min="1" step="50" oninput="updateTCN(this.value)">
                    <span>/ USD</span>
                </div>
                <div style="font-size:10px;color:var(--text3);">Todos los montos en U$S</div>
            </div>
            <div class="save-indicator">
                <div class="save-dot" id="saveDot"></div>
                <span id="saveText">Conectado</span>
            </div>
        </div>
    </aside>
    <div class="main">
        <div class="topbar">
            <h2 id="topbarTitle">Resumen general</h2>
            <div class="actions" id="topbarActions"></div>
        </div>
        <div class="content">
            <div class="alerts-banner" id="alertsBanner"></div>
            <div id="page-resumen" class="page active"></div>
            <div id="page-etapas" class="page"></div>
            <div id="page-rubros" class="page"></div>
            <div id="page-pagos" class="page"></div>
            <div id="page-balance" class="page"></div>
            <div id="page-config" class="page"></div>
        </div>
    </div>
</div>

<!-- MODAL PAGO -->
<div class="modal-overlay" id="modalPago">
    <div class="modal">
        <div class="modal-hdr"><h3 id="mPagoTitle">Registrar pago</h3><button class="btn btn-sm" onclick="closeModal('modalPago')">✕</button></div>
        <div class="modal-body">
            <div class="form-row">
                <div class="fg"><label>Fecha</label><input type="date" id="mFecha"></div>
                <div class="fg"><label>Rubro</label><select id="mRubro"></select></div>
            </div>
            <div class="form-row full"><div class="fg"><label>Descripción</label><input type="text" id="mDesc" placeholder="Descripción del pago"></div></div>
            <div class="form-row">
                <div class="fg"><label>Monto (U$S)</label><div class="amt-wrap"><input type="number" id="mMonto" placeholder="0" min="0"><span class="amt-tag">USD</span></div></div>
                <div class="fg"><label>Estado</label><select id="mEstado"><option value="pagado">Pagado</option><option value="pendiente">Pendiente</option><option value="vencido">Vencido</option></select></div>
            </div>
        </div>
        <div class="modal-ftr"><button class="btn" onclick="closeModal('modalPago')">Cancelar</button><button class="btn btn-primary" onclick="savePago()">Guardar</button></div>
    </div>
</div>

<!-- MODAL RUBRO -->
<div class="modal-overlay" id="modalRubro">
    <div class="modal">
        <div class="modal-hdr"><h3 id="mRubroTitle">Agregar rubro</h3><button class="btn btn-sm" onclick="closeModal('modalRubro')">✕</button></div>
        <div class="modal-body">
            <div class="form-row full"><div class="fg"><label>Nombre</label><input type="text" id="rNombre" placeholder="Ej: Pintura exterior"></div></div>
            <div class="form-row">
                <div class="fg"><label>Presupuesto (U$S)</label><div class="amt-wrap"><input type="number" id="rPresup" placeholder="0" min="0"><span class="amt-tag">USD</span></div></div>
                <div class="fg"><label>Color</label><input type="color" id="rColor" value="#4C8EF5"></div>
            </div>
        </div>

<script>
// ═══════════════════════════════════════
// CREDENCIALES SUPABASE
// ═══════════════════════════════════════
var SB_URL = 'https://wwenbjngzgdpchmhxrkc.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3ZW5iam5nemdkcGNobWh4cmtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NzE0NzcsImV4cCI6MjA5MTM0NzQ3N30.gXv_-ys9ly4-h0Eh2ioKNXKEvgnQRP6-FJUIRqLvU98';
var sb = null;

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
var MO = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
var S = {
    startDate: '2026-04-01', tcn: 1200,
    rubros: [], pagos: [], etapas: [], ingresos: [], deudas: [], ajustes: [],
    editPagoId: null, editRubroId: null, editEtapaId: null, editBalType: null, editBalId: null
};

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function fmtUSD(ars) { return 'U$S ' + Math.round(ars / S.tcn).toLocaleString('es-AR'); }
function fmtMain(ars) { return fmtUSD(ars); }
function pct(a, b) { return b > 0 ? Math.min(Math.round(a / b * 100), 999) : 0; }
function getRubro(id) { return S.rubros.find(function(r){ return r.id === id; }); }
function monthDate(off) { var d = new Date(S.startDate); return new Date(d.getFullYear(), d.getMonth() + off, 1); }
function curMonthOff() { var s = new Date(S.startDate), n = new Date(); return (n.getFullYear()-s.getFullYear())*12+(n.getMonth()-s.getMonth()); }
function mLabel(off) { var d = monthDate(off); return MO[d.getMonth()]+" '"+String(d.getFullYear()).slice(2); }
function mesStr(off) { var d = monthDate(off); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function totalPresARS() { return S.rubros.reduce(function(s,r){ return s+r.presupARS; }, 0); }
function totalPagadoARS() { return S.pagos.filter(function(p){ return p.estado==='pagado'; }).reduce(function(s,p){ return s+p.montoARS; }, 0); }
function totalPendienteARS() { return S.pagos.filter(function(p){ return p.estado!=='pagado'; }).reduce(function(s,p){ return s+p.montoARS; }, 0); }
function expandirIngreso(x) {
    var step = {'unico':0,'mensual':1,'bimestral':2,'trimestral':3,'semestral':6,'anual':12}[x.periodicidad||'unico']||0;
    var ocurrencias = [];
    var proyEnd = new Date(S.startDate); proyEnd.setMonth(proyEnd.getMonth()+18);
    var fechaHasta = x.fechaHasta ? new Date(x.fechaHasta+'T00:00:00') : proyEnd;
    if (fechaHasta > proyEnd) fechaHasta = proyEnd;
    var d = new Date(x.fecha+'T00:00:00');
    if (step === 0) {
        ocurrencias.push({fecha:x.fecha, montoARS:x.montoARS, realizado:x.realizado});
    } else {
        while (d <= fechaHasta) {
            ocurrencias.push({fecha:d.toISOString().split('T')[0], montoARS:x.montoARS, realizado:x.realizado&&ocurrencias.length===0});
            d = new Date(d.getFullYear(), d.getMonth()+step, d.getDate());
        }
    }
    return ocurrencias;
}
function montoTotalIngreso(x) { return expandirIngreso(x).reduce(function(s,o){ return s+o.montoARS; }, 0); }
function totalDeudasARS() { return S.deudas.reduce(function(s,d){ return s+(d.montoARS*(d.cuotas-d.pagadas)/d.cuotas); }, 0); }
function totalAjustesARS() { return S.ajustes.reduce(function(s,a){ return s+a.montoARS; }, 0); }

function setSaveStatus(state, txt) {
    var dot = document.getElementById('saveDot');
    var lbl = document.getElementById('saveText');
    if (!dot) return;
    dot.className = 'save-dot' + (state==='saving'?' saving':state==='error'?' error':'');
    lbl.textContent = txt || (state==='saving'?'Guardando...':state==='error'?'Error al guardar':'Guardado');
}

function updateTCN(v) {
    S.tcn = parseFloat(v) || 1200;
    S.rubros.forEach(function(r){ r.presupARS = r.presupUSD * S.tcn; });
    S.pagos.forEach(function(p){ p.montoARS = p.montoUSD * S.tcn; });
    S.ingresos.forEach(function(x){ x.montoARS = x.montoUSD * S.tcn; });
    S.deudas.forEach(function(x){ x.montoARS = x.montoUSD * S.tcn; });
    S.ajustes.forEach(function(x){ x.montoARS = x.montoUSD * S.tcn; });
    renderCurrent();
    sb.from('obra_config').update({tcn:S.tcn}).eq('id','main').then(function(r){
        setSaveStatus(r.error?'error':'ok', r.error?'Error TCN':'Guardado');
    });
}

// ═══════════════════════════════════════
// SUPABASE INIT & LOAD
// ═══════════════════════════════════════
async function initApp() {
    sb = supabase.createClient(SB_URL, SB_KEY);
    document.getElementById('page-resumen').innerHTML =
        '<div style="display:flex;align-items:center;gap:10px;padding:4rem;color:var(--text3);">' +
        '<span class="spinner"></span>Cargando datos...</div>';
    await loadAllData();
    renderCurrent();
}

async function loadAllData() {
    var results = await Promise.all([
        sb.from('obra_config').select('*').eq('id','main').single(),
        sb.from('obra_rubros').select('*').order('orden'),
        sb.from('obra_pagos').select('*').order('fecha'),
        sb.from('obra_etapas').select('*').order('orden'),
        sb.from('obra_ingresos').select('*').order('fecha'),
        sb.from('obra_deudas').select('*').order('created_at'),
        sb.from('obra_ajustes').select('*').order('fecha')
    ]);
    var cfg=results[0], rubros=results[1], pagos=results[2], etapas=results[3],
        ingresos=results[4], deudas=results[5], ajustes=results[6];

    if (cfg.data) {
        S.startDate = cfg.data.start_date;
        S.tcn = parseFloat(cfg.data.tcn) || 1200;
        var inp = document.getElementById('tcnInput');
        if (inp) inp.value = S.tcn;
    }
    S.rubros   = (rubros.data||[]).map(function(r){ return {id:r.id, nombre:r.nombre, presupARS:r.presup_usd*S.tcn, presupUSD:r.presup_usd, color:r.color, avanceFisico:r.avance_fisico, orden:r.orden}; });
    S.pagos    = (pagos.data||[]).map(function(p){ return {id:p.id, fecha:p.fecha, rubroId:p.rubro_id, desc:p.descripcion, montoARS:p.monto_usd*S.tcn, montoUSD:p.monto_usd, estado:p.estado}; });
    S.etapas   = (etapas.data||[]).map(function(e){ return {id:e.id, nombre:e.nombre, mesIni:e.mes_ini, mesFin:e.mes_fin, color:e.color, avance:e.avance, orden:e.orden}; });
    S.ingresos = (ingresos.data||[]).map(function(x){
        var obj={id:x.id, fecha:x.fecha, desc:x.descripcion, montoARS:x.monto_usd*S.tcn, montoUSD:x.monto_usd, realizado:x.realizado, periodicidad:x.periodicidad, fechaHasta:x.fecha_hasta||''};
        // calcular nCuotas si tiene fechaHasta y es mensual
        if(x.periodicidad==='mensual'&&x.fecha_hasta){
            var d0=new Date(x.fecha+'T00:00:00'), d1=new Date(x.fecha_hasta+'T00:00:00');
            obj.nCuotas=(d1.getFullYear()-d0.getFullYear())*12+(d1.getMonth()-d0.getMonth())+1;
        }
        return obj;
    });
    S.deudas   = (deudas.data||[]).map(function(x){ return {id:x.id, desc:x.descripcion, montoARS:x.monto_usd*S.tcn, montoUSD:x.monto_usd, cuotas:x.cuotas, pagadas:x.pagadas, fechaInicio:x.fecha_inicio}; });
    S.ajustes  = (ajustes.data||[]).map(function(x){ return {id:x.id, fecha:x.fecha, desc:x.descripcion, montoARS:x.monto_usd*S.tcn, montoUSD:x.monto_usd}; });
    updateSidebar();
}

// ═══════════════════════════════════════
// ALERTS
// ═══════════════════════════════════════
function renderAlerts() {
    var items = [];
    S.rubros.forEach(function(r) {
        var g = S.pagos.filter(function(p){ return p.rubroId===r.id&&p.estado==='pagado'; }).reduce(function(s,p){ return s+p.montoARS; },0);
        var p2 = pct(g, r.presupARS);
        if (g > r.presupARS) {
            items.push('<div class="alert-item danger"><strong>'+r.nombre+'</strong> — excedido en '+fmtMain(g-r.presupARS)+'</div>');
        } else if (p2 >= 80) {
            items.push('<div class="alert-item warning"><strong>'+r.nombre+'</strong> — '+p2+'% utilizado</div>');
        }
    });
    var v = S.pagos.filter(function(p){ return p.estado==='vencido'; }).length;
    if (v) items.push('<div class="alert-item danger"><strong>'+v+' pago'+(v>1?'s':'')+' vencido'+(v>1?'s':'')+' sin registrar</strong></div>');
    document.getElementById('alertsBanner').innerHTML = items.join('');
}

// ═══════════════════════════════════════
// PAGE: RESUMEN
// ═══════════════════════════════════════
var chartMens = null;
function renderResumen() {
    var tp=totalPresARS(), pd=totalPagadoARS(), pe=totalPendienteARS(), sl=tp-pd-pe, av=pct(pd,tp), cm=curMonthOff();
    var avanceRows = S.rubros.map(function(r) {
        var g = S.pagos.filter(function(p){ return p.rubroId===r.id&&p.estado==='pagado'; }).reduce(function(s,p){ return s+p.montoARS; },0);
        var pFin=pct(g,r.presupARS), ov=g>r.presupARS, pFis=r.avanceFisico||0;
        return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">' +
            '<span style="width:8px;height:8px;border-radius:2px;background:'+r.color+';flex-shrink:0;display:inline-block;margin-top:2px;"></span>' +
            '<div style="flex:1;min-width:0;">' +
            '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;">' +
            '<span style="font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;">'+r.nombre+'</span>' +
            '<span style="font-size:11px;font-family:DM Mono,monospace;color:'+(ov?'var(--red)':'var(--text3)')+';">'+fmtMain(g)+' / '+fmtMain(r.presupARS)+'</span>' +
            '</div>' +
            '<div style="position:relative;height:10px;background:var(--surface3);border-radius:5px;overflow:hidden;">' +
            '<div style="position:absolute;inset:0;width:'+pFis+'%;background:'+r.color+'33;border-radius:5px;"></div>' +
            '<div style="position:absolute;inset:0;width:'+Math.min(pFin,100)+'%;background:'+(ov?'var(--red)':r.color)+';border-radius:5px;"></div>' +
            '</div>' +
            '<div style="display:flex;justify-content:space-between;margin-top:2px;">' +
            '<span style="font-size:10px;color:var(--text3);">Financiero: <span style="color:'+(ov?'var(--red)':'inherit')+'">'+pFin+'%</span></span>' +
            '<span style="font-size:10px;color:var(--text3);">Físico: '+pFis+'%</span>' +
            '</div></div></div>';
    }).join('');
    var etapaRows = S.etapas.map(function(e) {
        var en=cm>=e.mesIni-1&&cm<e.mesFin, past=cm>=e.mesFin;
        var cls=past&&e.avance<100?'atrasada':past?'completada':en?'en-curso':'pendiente';
        var lbl={atrasada:'Atrasada',completada:'Completada','en-curso':'En curso',pendiente:'Pendiente'}[cls];
        return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">' +
            '<span style="width:8px;height:8px;border-radius:2px;background:'+e.color+';flex-shrink:0;display:inline-block;"></span>' +
            '<span style="flex:1;font-size:12px;color:var(--text2);">'+e.nombre+'</span>' +
            '<div style="width:80px;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;"><div style="height:100%;width:'+e.avance+'%;background:'+e.color+';border-radius:3px;"></div></div>' +
            '<span style="font-size:11px;font-family:DM Mono,monospace;color:var(--text3);width:26px;text-align:right;">'+e.avance+'%</span>' +
            '<span class="etapa-status '+cls+'" style="min-width:66px;text-align:center;">'+lbl+'</span></div>';
    }).join('');
    var mStrip = Array.from({length:18}, function(_,i) {
        var cl = i<cm?'past':i===cm?'current':'future';
        return '<div class="mc '+cl+'">'+mLabel(i)+'</div>';
    }).join('');
    document.getElementById('page-resumen').innerHTML =
        '<div class="metrics">' +
        '<div class="metric-card"><div class="ml">Presupuesto total</div><div class="mv c-blue">'+fmtMain(tp)+'</div><div class="ms">'+S.rubros.length+' rubros</div></div>' +
        '<div class="metric-card"><div class="ml">Ejecutado</div><div class="mv c-green">'+fmtMain(pd)+'</div><div class="ms">'+av+'% del total</div></div>' +
        '<div class="metric-card"><div class="ml">Comprometido</div><div class="mv c-amber">'+fmtMain(pe)+'</div><div class="ms">'+S.pagos.filter(function(p){return p.estado!=='pagado';}).length+' pagos pend.</div></div>' +
        '<div class="metric-card"><div class="ml">Disponible</div><div class="mv '+(sl<0?'c-red':'c-green')+'">'+fmtMain(sl)+'</div><div class="ms">'+(sl<0?'Excedido':'Sin comprometer')+'</div></div>' +
        '</div>' +
        '<div class="grid2">' +
        '<div><div class="card"><div class="card-hdr"><h3>Avance de obra</h3><span style="font-size:18px;font-weight:600;font-family:DM Mono,monospace;color:var(--blue)">'+av+'%</span></div>' +
        '<div class="card-body">' +
        '<div style="height:8px;background:var(--surface3);border-radius:4px;overflow:hidden;margin-bottom:16px;"><div style="height:100%;width:'+av+'%;background:var(--blue);border-radius:4px;"></div></div>' +
        '<div style="font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;">Rubros</div>' + avanceRows +
        '<div style="border-top:1px solid var(--border);margin-top:14px;padding-top:14px;">' +
        '<div style="font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;">Etapas</div>' + etapaRows +
        '</div></div></div></div>' +
        '<div><div class="card" style="margin-bottom:14px;"><div class="card-hdr"><h3>Cronograma</h3><span style="font-size:11px;color:var(--text3);">Mes '+Math.max(0,Math.min(18,cm+1))+' / 18</span></div>' +
        '<div class="card-body"><div class="months-strip">'+mStrip+'</div></div></div>' +
        '<div class="card"><div class="card-hdr"><h3>Gasto mensual (U$S)</h3></div><div class="card-body"><div style="position:relative;width:100%;height:180px;"><canvas id="chartMens"></canvas></div></div></div>' +
        '</div></div>';
    if (chartMens) chartMens.destroy();
    var labels = Array.from({length:18}, function(_,i){ return mLabel(i); });
    var data = labels.map(function(_,i){
        var ms = mesStr(i);
        return S.pagos.filter(function(p){ return p.estado==='pagado'&&p.fecha.startsWith(ms); }).reduce(function(s,p){ return s+p.montoARS/S.tcn; },0);
    });
    var cm2 = curMonthOff();
    chartMens = new Chart(document.getElementById('chartMens').getContext('2d'),{
        type:'bar',
        data:{labels:labels,datasets:[{data:data,backgroundColor:data.map(function(_,i){ return i===cm2?'#4C8EF5':'rgba(76,142,245,.4)'; }),borderRadius:4,borderSkipped:false}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(v){ return 'U$S '+Math.round(v.raw).toLocaleString('es-AR'); }}}},
        scales:{x:{ticks:{color:'#565C7A',font:{size:9},maxRotation:45,autoSkip:false},grid:{color:'rgba(255,255,255,.03)'}},y:{ticks:{color:'#565C7A',font:{size:10},callback:function(v){ return v>=1000?'U$S '+(v/1000).toFixed(0)+'k':'U$S '+Math.round(v); }},grid:{color:'rgba(255,255,255,.04)'}}}}
    });
}

        '<div class="gantt-row" style="margin-bottom:5px;"><div class="gantt-label" style="font-size:10px;color:var(--text3);text-align:right;padding-right:10px;">ETAPA</div>' +
        '<div class="months-strip" style="margin-bottom:0;">'+mStrip+'</div></div>' + gantt +
        '</div></div></div>' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">' +
        '<div><div style="font-size:13px;font-weight:600;">Etapas de obra</div><div style="font-size:11px;color:var(--text3);margin-top:2px;">Arrastrá para reordenar</div></div>' +
        '<button class="btn btn-primary" onclick="openNewEtapa()">+ Nueva etapa</button></div>' +
        '<div class="drag-list" id="etapasList">'+(items||'<div class="empty">Sin etapas</div>')+'</div>';

var chartBal = null;
function renderBalance() {
    var PLABELS = {'unico':'Único','mensual':'Mensual','bimestral':'Bimestral','trimestral':'Trimestral','semestral':'Semestral','anual':'Anual'};
    var CS = 'background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;';
    var HS = 'display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2);';
    var THS = 'padding:7px 14px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;';

    var allOcurr = []; S.ingresos.forEach(function(x){ expandirIngreso(x).forEach(function(o){ allOcurr.push(o); }); });
    var ingReal = allOcurr.filter(function(o){ return o.realizado; }).reduce(function(s,o){ return s+o.montoARS; },0);
    var ingProy = allOcurr.filter(function(o){ return !o.realizado; }).reduce(function(s,o){ return s+o.montoARS; },0);
    var deu = totalDeudasARS(), aj = totalAjustesARS(), neto = ingReal+ingProy-deu-aj;
    var presup = totalPresARS(), isPos = neto >= 0;

    // meses cubiertos
    var _saldo=ingReal, _mesesCub=0;
    for(var qi=0;qi<18;qi++){
        var qms=mesStr(qi);
        var dMes=S.deudas.reduce(function(s,d){ var fi=d.fechaInicio||S.startDate; if(qms<fi.substring(0,7)) return s; var sd=new Date(fi+'T00:00:00'),td=monthDate(qi); var ix=(td.getFullYear()-sd.getFullYear())*12+(td.getMonth()-sd.getMonth()); if(ix<0||ix>=d.cuotas) return s; return s+(d.montoARS/d.cuotas); },0);
        if(_saldo>=dMes){ _saldo-=dMes; _mesesCub++; } else break;
    }
    var _mesQ=-1, _mesQL='', _cIR=0, _cIP=0, _cDeu=0;
    for(var qi2=0;qi2<18;qi2++){
        var qms2=mesStr(qi2);
        _cIR+=allOcurr.filter(function(o){ return o.realizado&&o.fecha.startsWith(qms2); }).reduce(function(s,o){ return s+o.montoARS; },0);
        _cIP+=allOcurr.filter(function(o){ return !o.realizado&&o.fecha.startsWith(qms2); }).reduce(function(s,o){ return s+o.montoARS; },0);
        _cDeu+=S.deudas.reduce(function(s,d){ var fi=d.fechaInicio||S.startDate; if(qms2<fi.substring(0,7)) return s; var sd=new Date(fi+'T00:00:00'),td=monthDate(qi2); var ix=(td.getFullYear()-sd.getFullYear())*12+(td.getMonth()-sd.getMonth()); if(ix<0||ix>=d.cuotas) return s; return s+(d.montoARS/d.cuotas); },0);
        if(_cIR+_cIP-_cDeu<0&&_mesQ===-1){ _mesQ=qi2+1; _mesQL=mLabel(qi2); }
    }

    // filas ingresos proyectados
    var ingRows = S.ingresos.filter(function(x){ return !x.realizado; }).map(function(x){
        var per=x.periodicidad||'unico', occ=expandirIngreso(x).length;
        var cuotaLabel=x.nCuotas?(occ+'/'+x.nCuotas+' cuotas'):occ+' ocurr.';
        var sub=per==='unico'?x.fecha:x.fecha+(x.fechaHasta?' > '+x.fechaHasta:'')+' · '+cuotaLabel;
        return '<tr onclick="toggleRealizado('+x.id+')" style="cursor:pointer;">' +
            '<td style="padding:9px 14px;border-bottom:1px solid var(--border);"><div style="display:flex;align-items:center;gap:8px;"><div style="width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;"></div><div><div style="font-size:13px;font-weight:500;">'+x.desc+'</div><div style="font-size:11px;color:var(--text3);">'+sub+'</div></div></div></td>' +
            '<td style="padding:9px 14px;border-bottom:1px solid var(--border);text-align:center;"><span style="font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;background:var(--surface3);color:var(--text3);">'+( PLABELS[per]||per)+'</span></td>' +
            '<td style="padding:9px 14px;border-bottom:1px solid var(--border);text-align:right;font-family:DM Mono,monospace;font-size:13px;font-weight:600;color:var(--text2);">'+fmtUSD(x.montoARS)+'</td>' +
            '<td style="padding:9px 14px;border-bottom:1px solid var(--border);text-align:right;"><div style="display:flex;gap:4px;justify-content:flex-end;">' +
            '<button class="btn btn-sm" onclick="event.stopPropagation();openEditBal(\'ingreso\','+x.id+')">✎</button>' +
            '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteBal(\'ingreso\','+x.id+')">✕</button>' +
            '</div></td></tr>';
    }).join('') || '<tr><td colspan="4" style="padding:14px;text-align:center;color:var(--text3);">Sin ingresos proyectados</td></tr>';

    // filas ingresos acreditados
    var acrRows = S.ingresos.filter(function(x){ return x.realizado; })
        .sort(function(a,b){ return b.fecha.localeCompare(a.fecha); })
        .map(function(x){
            var per=x.periodicidad||'unico';
            return '<tr>' +
                '<td style="padding:9px 14px;border-bottom:1px solid var(--border);font-family:DM Mono,monospace;font-size:12px;color:var(--text3);">'+x.fecha+'</td>' +
                '<td style="padding:9px 14px;border-bottom:1px solid var(--border);"><div style="font-size:13px;font-weight:500;">'+x.desc+'</div></td>' +
                '<td style="padding:9px 14px;border-bottom:1px solid var(--border);text-align:center;"><span style="font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;background:var(--blue-dim);color:var(--blue);">'+(PLABELS[per]||per)+'</span></td>' +
                '<td style="padding:9px 14px;border-bottom:1px solid var(--border);text-align:right;font-family:DM Mono,monospace;font-size:13px;font-weight:600;color:var(--green);">'+fmtUSD(x.montoARS)+'</td>' +
                '<td style="padding:9px 14px;border-bottom:1px solid var(--border);text-align:right;"><div style="display:flex;gap:4px;justify-content:flex-end;">' +
                '<button class="btn btn-sm" onclick="openEditBal(\'ingreso\','+x.id+')">✎</button>' +
                '<button class="btn btn-sm btn-danger" onclick="deleteBal(\'ingreso\','+x.id+')">✕</button>' +
                '</div></td></tr>';
        }).join('') || '<tr><td colspan="5" style="padding:14px;text-align:center;color:var(--text3);">Sin ingresos acreditados todavia</td></tr>';

    // filas deudas
    var deuRows = S.deudas.map(function(x){
        var sal=x.montoARS*(x.cuotas-x.pagadas)/x.cuotas, pp=Math.round(x.pagadas/x.cuotas*100);
        return '<tr>' +
            '<td style="padding:9px 14px;border-bottom:1px solid var(--border);"><div style="font-size:13px;font-weight:500;">'+x.desc+'</div>' +
            '<div style="font-size:11px;color:var(--text3);">'+x.pagadas+'/'+x.cuotas+' cuotas · inicio '+(x.fechaInicio||'—')+'</div>' +
            '<div style="height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-top:5px;width:120px;"><div style="height:100%;width:'+pp+'%;background:'+(pp===100?'var(--green)':'var(--red)')+';border-radius:2px;"></div></div></td>' +
            '<td style="padding:9px 14px;border-bottom:1px solid var(--border);text-align:center;font-family:DM Mono,monospace;font-size:11px;color:var(--text3);">'+pp+'%</td>' +
            '<td style="padding:9px 14px;border-bottom:1px solid var(--border);text-align:right;font-family:DM Mono,monospace;font-size:13px;font-weight:600;color:var(--red);">'+fmtUSD(sal)+'</td>' +
            '<td style="padding:9px 14px;border-bottom:1px solid var(--border);text-align:right;"><div style="display:flex;gap:4px;justify-content:flex-end;">' +
            '<button class="btn btn-sm btn-green" onclick="pagarCuota('+x.id+')" title="Pagar cuota">✓</button>' +
            '<button class="btn btn-sm" onclick="openEditBal(\'deuda\','+x.id+')">✎</button>' +

            +'<div class="form-row full"><div class="fg"><label>Descripción</label><input type="text" id="bDesc" placeholder="Ej: Sueldo"></div></div>'
            +'<div class="form-row">'
            +'<div class="fg"><label>Modalidad</label><select id="bPeriod" onchange="toggleModoIngreso()">'+perOpts+'</select></div>'

            +'</div>'
            +'<div class="fg" id="fgFechaHasta" style="margin-bottom:12px;'+(per==='unico'||per==='cuotas'?'opacity:.4;pointer-events:none;':'')+'"><label>Fecha hasta (para cobros recurrentes)</label><input type="date" id="bFechaHasta" value="'+fh+'"></div>'
            +'<div style="display:flex;align-items:center;gap:10px;margin-top:4px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border);"><input type="checkbox" id="bRealizado" '+chk+' style="width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0;"><label for="bRealizado" style="font-size:13px;cursor:pointer;user-select:none;">Ya fue <strong style="color:var(--green)">acreditado</strong> (primera cuota)</label></div>';
    }

}
function toggleFechaHasta(){ toggleModoIngreso(); }
function toggleModoIngreso(){
    var p=document.getElementById('bPeriod');
    var fgFH=document.getElementById('fgFechaHasta');
    var fgCuotas=document.getElementById('fgCuotas');
    if(!p) return;
    var val=p.value;
    var isCuotas=(val==='cuotas');
    var isUnico=(val==='unico');
    if(fgFH){ fgFH.style.opacity=(isUnico||isCuotas)?'0.4':'1'; fgFH.style.pointerEvents=(isUnico||isCuotas)?'none':'auto'; }
    if(fgCuotas){ fgCuotas.style.opacity=isCuotas?'1':'0.4'; fgCuotas.style.pointerEvents=isCuotas?'auto':'none'; }
}

async function saveBalanceItem(){
    var type=S.editBalType, raw=parseFloat(document.getElementById('bMonto').value)||0, descEl=document.getElementById('bDesc'), desc=descEl?descEl.value.trim():'';
    if(!raw||!desc) return;
    setSaveStatus('saving');
    var res;
    if(type==='ingreso'){
        var fecha=document.getElementById('bFecha').value;
        var realizado=!!(document.getElementById('bRealizado')&&document.getElementById('bRealizado').checked);
        var periodicidad=document.getElementById('bPeriod')?document.getElementById('bPeriod').value:'unico';
        var fechaHasta=null;
        var nCuotas=null;
        if(periodicidad==='cuotas'){
            // cuotas mensuales: calcular fechaHasta desde fecha + (nCuotas-1) meses
            nCuotas=parseInt(document.getElementById('bNCuotas').value)||1;
            var dInicio=new Date(fecha+'T00:00:00');
            var dFin=new Date(dInicio.getFullYear(), dInicio.getMonth()+(nCuotas-1), dInicio.getDate());
            fechaHasta=dFin.toISOString().split('T')[0];
            periodicidad='mensual'; // se guarda como mensual con fechaHasta calculado
        } else if(periodicidad!=='unico'){
            fechaHasta=document.getElementById('bFechaHasta')?document.getElementById('bFechaHasta').value||null:null;
        }
        var p={fecha:fecha,descripcion:desc,monto_usd:raw,realizado:realizado,periodicidad:periodicidad,fecha_hasta:fechaHasta};
        res = S.editBalId ? await sb.from('obra_ingresos').update(p).eq('id',S.editBalId) : await sb.from('obra_ingresos').insert(p);
    } else if(type==='ajuste'){
        var p2={fecha:document.getElementById('bFecha').value,descripcion:desc,monto_usd:raw};
        res = S.editBalId ? await sb.from('obra_ajustes').update(p2).eq('id',S.editBalId) : await sb.from('obra_ajustes').insert(p2);
    } else {
        var cuotas=parseInt(document.getElementById('bCuotas').value)||1, pagadas=Math.min(parseInt(document.getElementById('bPagadas').value)||0,cuotas), fechaD=document.getElementById('bFechaDeuda').value||new Date().toISOString().split('T')[0];
        var p3={descripcion:desc,monto_usd:raw,cuotas:cuotas,pagadas:pagadas,fecha_inicio:fechaD};
        res = S.editBalId ? await sb.from('obra_deudas').update(p3).eq('id',S.editBalId) : await sb.from('obra_deudas').insert(p3);
    }
    if(res&&res.error){ setSaveStatus('error'); alert('Error: '+res.error.message); return; }
    setSaveStatus('ok','Guardado'); closeModal('modalBalance'); await loadAllData(); renderBalance(); updateSidebar();
}

async function deleteBal(type,id){
    if(!confirm('Eliminar?')) return;
    setSaveStatus('saving');
    var table=type==='ingreso'?'obra_ingresos':type==='deuda'?'obra_deudas':'obra_ajustes';
    var res=await sb.from(table).delete().eq('id',id);
    if(res.error){ setSaveStatus('error'); return; }
    setSaveStatus('ok','Guardado'); await loadAllData(); renderBalance(); updateSidebar();
}

        '<div class="card"><div class="card-hdr"><h3>Datos de la obra</h3></div><div class="card-body"><div class="form-row full"><div class="fg"><label>Fecha de inicio</label><input type="date" id="cfgStart" value="'+S.startDate+'"></div></div><button class="btn btn-primary" style="margin-top:4px;" onclick="saveConfigDB()">Guardar</button></div></div>' +
        '<div class="card" style="margin-top:14px;"><div class="card-hdr"><h3>Tipo de cambio</h3></div><div class="card-body"><div style="display:flex;align-items:center;gap:8px;margin-top:4px;"><span style="color:var(--text2);">$</span><input type="number" id="cfgTCN" value="'+S.tcn+'" min="1" step="50" style="width:120px;"><span style="color:var(--text2);">/ USD</span><button class="btn btn-primary" onclick="saveTCNcfg()">Aplicar</button></div></div></div>' +
        '</div><div>' +
        '<div class="card"><div class="card-hdr"><h3>Exportar Excel</h3></div><div class="card-body"><button class="btn btn-excel" onclick="exportarExcel()">Exportar Excel completo</button></div></div>' +
        '<div class="card" style="margin-top:14px;"><div class="card-hdr"><h3>Estadísticas</h3></div><div class="card-body">' +
        [['Rubros',S.rubros.length],['Pagos',S.pagos.length],['Etapas',S.etapas.length],['Ingresos',S.ingresos.length],['Deudas',S.deudas.length],['Mes actual',Math.max(0,Math.min(18,curMonthOff()+1))+' / 18'],['TCN','$'+S.tcn.toLocaleString('es-AR')+'/USD']].map(function(x){ return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;"><span style="color:var(--text2);">'+x[0]+'</span><span style="font-family:DM Mono,monospace;font-weight:500;">'+x[1]+'</span></div>'; }).join('') +
        '</div></div></div></div>';
}
async function saveConfigDB(){ S.startDate=document.getElementById('cfgStart').value; setSaveStatus('saving'); var res=await sb.from('obra_config').update({start_date:S.startDate}).eq('id','main'); setSaveStatus(res.error?'error':'ok',res.error?'Error':'Guardado'); updateSidebar(); goTo('resumen'); }
async function saveTCNcfg(){ var v=parseFloat(document.getElementById('cfgTCN').value)||1200; document.getElementById('tcnInput').value=v; updateTCN(v); }

// ═══════════════════════════════════════
// EXCEL
// ═══════════════════════════════════════
function exportarExcel(){
    var tp=totalPresARS(),pd=totalPagadoARS(),pe=totalPendienteARS(),sl=tp-pd-pe;
    var wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['CONTROL DE OBRA'],['TCN: $'+S.tcn+'/USD'],[''],['Concepto','USD'],['Presupuesto',Math.round(tp/S.tcn)],['Pagado',Math.round(pd/S.tcn)],['Comprometido',Math.round(pe/S.tcn)],['Disponible',Math.round(sl/S.tcn)],['Avance %',pct(pd,tp)+'%']]),'Resumen');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['RUBROS'],['Rubro','Presup USD','Pagado USD','Disponible USD','Ejec %']].concat(S.rubros.map(function(r){ var g=S.pagos.filter(function(p){ return p.rubroId===r.id&&p.estado==='pagado'; }).reduce(function(s,p){ return s+p.montoARS; },0); return [r.nombre,Math.round(r.presupUSD),Math.round(g/S.tcn),Math.round((r.presupARS-g)/S.tcn),pct(g,r.presupARS)+'%']; }))),'Rubros');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['PAGOS'],['Fecha','Rubro','Descripcion','Monto USD','Estado']].concat([].concat(S.pagos).sort(function(a,b){ return b.fecha.localeCompare(a.fecha); }).map(function(p){ var r=getRubro(p.rubroId); return [p.fecha,r?r.nombre:'—',p.desc||'',Math.round(p.montoUSD),p.estado]; }))),'Pagos');
    XLSX.writeFile(wb,'control-obra-'+new Date().toISOString().split('T')[0]+'.xlsx');
}

// ═══════════════════════════════════════
// DRAG & DROP
// ═══════════════════════════════════════
function makeDraggable(listId, arr, renderFn, dbTable){
    var list=document.getElementById(listId); if(!list) return;
    var dragSrc=null;
    list.querySelectorAll('.drag-item').forEach(function(el){
        el.setAttribute('draggable','true');
        el.addEventListener('dragstart',function(e){ dragSrc=el; el.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
        el.addEventListener('dragend',function(){ el.classList.remove('dragging'); list.querySelectorAll('.drag-item').forEach(function(x){ x.classList.remove('drag-over'); }); });
        el.addEventListener('dragover',function(e){ e.preventDefault(); if(el!==dragSrc) el.classList.add('drag-over'); });
        el.addEventListener('dragleave',function(){ el.classList.remove('drag-over'); });
        el.addEventListener('drop',function(e){
            e.preventDefault(); el.classList.remove('drag-over');
            if(dragSrc&&el!==dragSrc){
                var si=parseInt(dragSrc.dataset.idx), ti=parseInt(el.dataset.idx);
                var moved=arr.splice(si,1)[0]; arr.splice(ti,0,moved);
                renderFn();
                if(dbTable){ setSaveStatus('saving'); Promise.all(arr.map(function(item,idx){ return sb.from(dbTable).update({orden:idx}).eq('id',item.id); })).then(function(){ setSaveStatus('ok','Guardado'); }); }
            }
        });
    });
}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
var curPage = 'resumen';
var PAGE_TITLES = {resumen:'Resumen general',etapas:'Etapas de obra',rubros:'Rubros',pagos:'Pagos',balance:'Balance personal',config:'Configuración'};
var PAGE_ORDER  = ['resumen','etapas','rubros','pagos','balance','config'];

function goTo(page){
    curPage=page;
    document.querySelectorAll('.nav-item').forEach(function(b,i){ b.classList.toggle('active',PAGE_ORDER[i]===page); });
    document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
    document.getElementById('page-'+page).classList.add('active');
    document.getElementById('topbarTitle').textContent=PAGE_TITLES[page];
    document.getElementById('topbarActions').innerHTML=page==='pagos'?'<button class="btn btn-excel btn-sm" onclick="exportarExcel()">Excel</button>':'';
    renderCurrent();
}

function renderCurrent(){
    if(curPage==='resumen') renderResumen();
    else if(curPage==='etapas') renderEtapas();
    else if(curPage==='rubros') renderRubros();
    else if(curPage==='pagos') renderPagos();
    else if(curPage==='balance') renderBalance();
    else if(curPage==='config') renderConfig();
    renderAlerts();
    updateSidebar();
}

function updateSidebar(){
    var tp=totalPresARS(), pd=totalPagadoARS(), p2=pct(pd,tp);
    var prog=document.getElementById('sbProg'); if(prog) prog.style.width=p2+'%';
    var pct2=document.getElementById('sbProgPct'); if(pct2) pct2.textContent=p2+'%';
    var s=new Date(S.startDate), e=new Date(s.getFullYear(),s.getMonth()+18,1);
    var fb=document.getElementById('sbFechas'); if(fb) fb.textContent=MO[s.getMonth()]+' '+s.getFullYear()+' - '+MO[e.getMonth()]+' '+e.getFullYear();
}

function closeModal(id){ document.getElementById(id).classList.remove('open'); }
